<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="#", method="get" target="_blank" autocomplete="off">
        <section>
            <h1>Cabeçalho</h1>
            <p>O formulário</p>

            <fieldset>
                <legend>Descrição</legend>
                <p>
                    <label for="nome">
                        Nome:
                        <input 
                            type="text" 
                            id="name" 
                            name="nome"
                            placeholder="digite aqui seu nome"
                        >
                    </label>
                </p>

                <p>
                    <label for="born-date">
                        Nascimento:
                        <input 
                            type="date" 
                            name="born-date"
                            id="born-date"
                        >
                    </label>
                </p>

                <p>
                    <label for="color">
                        Cor Favorita:
                        <input 
                            type="color"
                            value="#4287f5"
                        >
                    </label>
                </p>

                <p>
                    <label for="photo">
                        Foto:
                        <input 
                            type="file"
                            id="photo"
                            name="photo"
                            accept="image/*"
                        >
                    </label>
                </p>

                <p>
                    <label for="password">
                        Senha:
                        <input 
                            type="password"
                            name="password"
                            id="password"
                        >
                    </label>
                </p>

                <p>
                    <button type="reset">Limpar</button>
                    <button type="submit">Submeter</button>
                </p>
            </fieldset>

        </section>
    </form>
</body>
</html>
