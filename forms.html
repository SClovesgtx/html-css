<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        label {
            display: block;
        }
    </style>
</head>
<body>
    <form action="#", method="get" target="_blank" autocomplete="off">
        <section>
            <h1>Cabeçalho</h1>
            <p>O formulário</p>

            <fieldset>
                <legend>Descrição</legend>
                <p>
                    <label for="nome">
                        Nome:
                        <input 
                            type="text" 
                            id="name" 
                            name="nome"
                            placeholder="digite aqui seu nome"
                        >
                    </label>
                </p>

                <p>
                    <label for="born-date">
                        Nascimento:
                        <input 
                            type="date" 
                            name="born-date"
                            id="born-date"
                        >
                    </label>
                </p>

                <p>
                    <label for="color">
                        Cor Favorita:
                        <input 
                            type="color"
                            value="#4287f5"
                        >
                    </label>
                </p>

                <p>
                    <label for="photo">
                        Foto:
                        <input 
                            type="file"
                            id="photo"
                            name="photo"
                            accept="image/*"
                        >
                    </label>
                </p>

                <p>
                    <label for="password">
                        Senha:
                        <input 
                            type="password"
                            name="password"
                            id="password"
                        >
                    </label>
                </p>

                <p>
                    <label for="range">
                        Nível de Satisfação:
                        <input 
                            type="range" 
                            id="range" 
                            name="range"
                            min="0" 
                            max="10"
                            step="1">
                    </label>
                </p>

                <p>
                    <label for="browser">Navegador:</label>
                    <input 
                        list="browsers" 
                        name="browser" 
                        id="browser"
                    >
                    <datalist id="browsers">
                        <option value="Edge">
                        <option value="Firefox">
                        <option value="Chrome">
                        <option value="Opera">
                        <option value="Safari">
                    </datalist>
                </p>

                <p>
                    <label for="select">
                        Pizza
                        <select 
                            name="select" 
                            id="select"
                        >
                            <option value="calabresa">calabresa</option>
                            <option disabled value="4chesse">quatro queijos</option>
                            <option value="chicken">frango</option>
                        </select>
                    </label>
                </p>

                <p>
                    <label for="comment">Comentário:</label>
                    <textarea 
                        name="comment" 
                        id="comment" cols="30" 
                        rows="10"></textarea>
                </p>

                <p>
                    <button type="reset">Limpar</button>
                    <button type="submit">Submeter</button>
                </p>
            </fieldset>

        </section>
    </form>
</body>
</html>
