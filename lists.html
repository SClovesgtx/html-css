<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>

        * {
            margin: 0;
            padding: 0;
        }

        nav {
            height: 50%;
            background: black;
            align-items: center;
            background: red;
        }

        nav a {
            color: rgb(36, 36, 230);
            padding: 10px;
            text-transform: uppercase;
            margin: 10px;
            display: block;
            text-decoration: none;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
        }

        nav a:hover {
            background: rgba(0, 0, 0, 0.3);
        }

        nav ul {
            display: flex;
            list-style-type: none;
        }

        ul {
            list-style-type: disc;
            padding: 5px;
        }

    </style>

</head>
<body>

    <nav>
        <ul>
            <li><a href="#">Home</a></li>
            <li><a href="#">Sobre</a></li>
            <li><a href="#">Contato</a></li>
        </ul>
    </nav>

    <ul>
        <li>Café</li>
        <li>Manga</li>
        <li>Laranja</li>
    </ul>

    <!-- tipos podem ser: 1, a, A, i, I -->
    <ol type="I"> 
        <li>Café</li>
        <li>Manga</li>
        <li>Laranja</li>
    </ol>

    <dl>
        <dt>Café</dt>
        <dd>bebida preta e quente</dd>
        <dt>Manga</dt>
        <dd>fruta de origem indiana</dd>
    </dl>
</body>
</html>
